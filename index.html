/* Smart Taobao link handler: tries app deep link first, falls back to web */
function openTaobao(webUrl, e){
  e.preventDefault();
  e.stopPropagation();
  var isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
  if(!isMobile){ window.open(webUrl,"_blank"); return; }
  /* Build the taobao:// deep link by wrapping the web URL */
  var deepLink = "taobao://m.taobao.com/tbopen/index.html?h5Url=" + encodeURIComponent(webUrl);
  var fallbackTimer = null;
  var hidden = false;
  function onVisChange(){ if(document.hidden){ hidden=true; clearTimeout(fallbackTimer); } }
  document.addEventListener("visibilitychange", onVisChange);
  /* Try opening the app */
  window.location.href = deepLink;
  /* If the app doesn't open within 1.5s, fall back to web */
  fallbackTimer = setTimeout(function(){
    document.removeEventListener("visibilitychange", onVisChange);
    if(!hidden){ window.open(webUrl,"_blank"); }
  }, 1500);
}

/* ─── MAIN APP ─── */
function App(){
  const [sortBy,setSortBy]=useState("weighted");
  const [filterV,setFilterV]=useState(null);
  const [expandId,setExpandId]=useState(null);
  const [showMethod,setShowMethod]=useState(false);

  const sorted=useMemo(function(){
    let items=[...SKIRTS];
    if(filterV) items=items.filter(function(s){return s.verdicts.includes(filterV)});
    items.sort(function(a,b){
      if(sortBy==="weighted") return getWeightedScore(b.scores)-getWeightedScore(a.scores);
      return (b.scores[sortBy]||0)-(a.scores[sortBy]||0);
    });
    return items;
  },[sortBy,filterV]);

  return React.createElement("div",{style:{minHeight:"100vh",background:"#0a0a0c",paddingBottom:40}},
    /* Header */
    React.createElement("div",{style:{padding:"32px 20px 24px",background:"linear-gradient(180deg,rgba(255,255,255,.03) 0%,transparent 100%)",borderBottom:"1px solid rgba(255,255,255,.05)"}},
      React.createElement("div",{style:{fontSize:10,fontWeight:700,letterSpacing:2.5,color:"rgba(255,255,255,.25)",textTransform:"uppercase",marginBottom:8}},"Taobao Activewear Research — April 2026"),
      React.createElement("h1",{style:{fontSize:28,fontWeight:400,margin:"0 0 6px",fontFamily:"'Instrument Serif',Georgia,serif",lineHeight:1.15,letterSpacing:-.5,background:"linear-gradient(135deg,#f0f0f0,#94a3b8)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"Women's Sports Skirts"),
      React.createElement("p",{style:{fontSize:13,color:"rgba(255,255,255,.35)",margin:0,lineHeight:1.5,maxWidth:420}},"Comparative grading of 8 popular sports skirts on Taobao. Tap any card to see pros/cons. Links open Taobao search/store pages.")
    ),

    React.createElement("div",{style:{padding:"0 16px",maxWidth:560,margin:"0 auto"}},

      /* Methodology */
      React.createElement("div",{style:{marginTop:20}},
        React.createElement("button",{onClick:function(){setShowMethod(!showMethod)},style:{width:"100%",padding:"14px 18px",background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.07)",borderRadius:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",color:"#e2e8f0"}},
          React.createElement("span",{style:{fontSize:12,fontWeight:700,letterSpacing:.5,textTransform:"uppercase"}},"◎ Evaluation Methodology"),
          React.createElement("span",{style:{fontSize:11,color:"rgba(255,255,255,.3)"}},showMethod?"▲":"▼")
        ),
        showMethod && React.createElement("div",{style:{padding:18,marginTop:1,background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.07)",borderTop:"none",borderRadius:"0 0 12px 12px",animation:"fadeSlide .3s ease"}},
          React.createElement("p",{style:{fontSize:12,color:"rgba(255,255,255,.5)",margin:"0 0 14px",lineHeight:1.7}},"Each skirt is scored 1–10 across six criteria, then combined via weighted aggregate. Scores derived from community reviews on Lemon8, Xiaohongshu, Zhihu, and TikTok, cross-referenced with store ratings and product specs."),
          React.createElement("div",{style:{display:"grid",gap:8}},
            CRITERIA.map(function(c){
              return React.createElement("div",{key:c.key,style:{display:"flex",alignItems:"flex-start",gap:10,padding:"8px 12px",borderRadius:8,background:"rgba(255,255,255,.02)"}},
                React.createElement("span",{style:{fontSize:13,fontWeight:800,color:"#38bdf8",fontFamily:"'JetBrains Mono',monospace",minWidth:38}},(c.weight*100).toFixed(0)+"%"),
                React.createElement("div",null,
                  React.createElement("div",{style:{fontSize:12,fontWeight:700,color:"#e2e8f0"}},c.label),
                  React.createElement("div",{style:{fontSize:11,color:"rgba(255,255,255,.35)",lineHeight:1.4}},c.desc)
                )
              );
            })
          ),
          React.createElement("p",{style:{fontSize:11,color:"rgba(255,255,255,.25)",margin:"14px 0 0",lineHeight:1.6,fontStyle:"italic"}},"Price Value = cost-per-wear potential. Fabric Tech = material composition & performance features. Functionality = built-in shorts, pockets, modesty features. Scores are approximate and based on available community data.")
        )
      ),

      /* Legend */
      React.createElement("div",{style:{marginTop:16,padding:"14px 16px",background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.07)",borderRadius:12}},
        React.createElement("div",{style:{fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"rgba(255,255,255,.3)",marginBottom:10}},"Verdict Tags — tap to filter"),
        React.createElement("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
          Object.entries(VERDICT_TAGS).map(function([key,v]){
            return React.createElement("button",{key:key,onClick:function(e){e.stopPropagation();setFilterV(filterV===key?null:key)},style:{padding:"4px 10px",borderRadius:20,fontSize:10,fontWeight:700,letterSpacing:.3,color:filterV===key?"#0a0a0c":v.color,background:filterV===key?v.color:v.bg,border:`1px solid ${v.color}44`,cursor:"pointer",textTransform:"uppercase",transition:"all .2s",whiteSpace:"nowrap"}},v.label);
          }),
          filterV && React.createElement("button",{onClick:function(e){e.stopPropagation();setFilterV(null)},style:{padding:"4px 10px",borderRadius:20,fontSize:10,fontWeight:700,color:"rgba(255,255,255,.4)",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",cursor:"pointer"}},"✕ Clear")
        )
      ),

      /* Sort */
      React.createElement("div",{style:{marginTop:16,display:"flex",gap:6,overflowX:"auto",paddingBottom:4}},
        SORT_OPTIONS.map(function(opt){
          return React.createElement("button",{key:opt.key,onClick:function(){setSortBy(opt.key)},style:{padding:"8px 14px",borderRadius:10,fontSize:11,fontWeight:600,whiteSpace:"nowrap",color:sortBy===opt.key?"#0a0a0c":"rgba(255,255,255,.45)",background:sortBy===opt.key?"#e2e8f0":"rgba(255,255,255,.04)",border:sortBy===opt.key?"1px solid #e2e8f0":"1px solid rgba(255,255,255,.08)",cursor:"pointer",transition:"all .2s"}},opt.label);
        })
      ),

      /* Count */
      React.createElement("div",{style:{marginTop:14,fontSize:11,color:"rgba(255,255,255,.25)",fontWeight:600,letterSpacing:.5}},
        sorted.length+" result"+(sorted.length!==1?"s":"")+" · sorted by "+SORT_OPTIONS.find(function(o){return o.key===sortBy}).label+(filterV?" · filtered: "+VERDICT_TAGS[filterV].label:"")
      ),

      /* Cards */
      React.createElement("div",{style:{marginTop:12,display:"grid",gap:12}},
        sorted.map(function(item,i){
          return React.createElement(Card,{key:item.id,item:item,rank:i+1,expanded:expandId===item.id,onToggle:function(){setExpandId(expandId===item.id?null:item.id)}});
        })
      ),

      sorted.length===0 && React.createElement("div",{style:{textAlign:"center",padding:"40px 20px",color:"rgba(255,255,255,.25)",fontSize:13}},"No skirts match this filter. Tap a verdict tag to clear."),

      /* GitHub Pages Guide */
      React.createElement(GithubGuide,null),

      /* Footer */
      React.createElement("div",{style:{marginTop:28,padding:"16px 0",borderTop:"1px solid rgba(255,255,255,.05)",textAlign:"center"}},
        React.createElement("p",{style:{fontSize:11,color:"rgba(255,255,255,.2)",margin:0,lineHeight:1.6}},"Data sourced from Lemon8, Xiaohongshu, Zhihu, TikTok reviews & Taobao/Tmall listings. Prices in CNY (¥). Scores approximate community sentiment as of April 2026. Links point to Taobao search results for each store/product.")
      )
    )
  );
}

ReactDOM.render(React.createElement(App,null),document.getElementById("root"));
</script>
